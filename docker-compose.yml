services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_PATH: "sqlite:////data/empleados.db"
      SECRET_KEY: "cambia-esta-clave-en-produccion-usa-una-larga-y-aleatoria"
    volumes:
      - db_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
